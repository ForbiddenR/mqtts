name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
            suffix: ''
          - os: macos-latest
            platform: darwin
            arch: amd64
            suffix: ''
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            suffix: ''
          - os: windows-latest
            platform: windows
            arch: amd64
            suffix: '.exe'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Wails Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: bun install
        working-directory: frontend

      - name: Build Wails app
        run: |
          wails build -platform ${{ matrix.platform }}/${{ matrix.arch }}

      - name: Rename binary
        shell: bash
        run: |
          cd build/bin
          if [ "${{ matrix.platform }}" = "windows" ]; then
            mv mqtts.exe mqtts-${{ matrix.platform }}-${{ matrix.arch }}.exe
          else
            mv mqtts mqtts-${{ matrix.platform }}-${{ matrix.arch }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mqtts-${{ matrix.platform }}-${{ matrix.arch }}
          path: build/bin/mqtts-*

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
